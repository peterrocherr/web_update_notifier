name: Bot Checker de Stock

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar codigo del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar librerias
        run: pip install -r requirements.txt

      - name: Ejecutar Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          URL_PRODUCTO: ${{ secrets.URL_PRODUCTO }}
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
        run: python main.py

      - name: Guardar estado nativo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add ultimo_estado.txt
          git commit -m "[Bot] Actualiza ultimo_estado.txt" || echo "Sin cambios en el stock"
          git push
