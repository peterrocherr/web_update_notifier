name: Bot Checker de Stock

on:
  schedule:
    - cron: '*/5 * * * *' # Se ejecuta cada 5 minutos exactos de forma ilimitada
  workflow_dispatch: # Permite pulsar un botón en GitHub para probarlo manualmente

permissions:
  contents: write # Permiso para que el bot actualice el archivo de texto

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar codigo del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar librerias
        run: pip install -r requirements.txt

      - name: Ejecutar Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          URL_PRODUCTO: ${{ secrets.URL_PRODUCTO }}
        run: python main.py

      - name: Guardar estado en el repositorio
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "[Bot] Actualiza ultimo_estado.txt"
          file_pattern: "ultimo_estado.txt"
